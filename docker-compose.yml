version: '3.7'

services:
  bsc-geth:
    build:
      context: .
      args:
        TAG: v1.4.11
    container_name: bsc-geth-dev
    network_mode: host
    volumes:
      - /etc/bsc-geth-dev:/etc/bsc-geth
      - /data/bsc-geth-dev:/var/lib/bsc-geth
    command:
      - --port=23003
      - --config=/etc/bsc-geth/config.toml
      - --datadir=/var/lib/bsc-geth
      - --cache=8192
      - --rpc.allow-unprotected-txs
      - --tries-verify-mode=none
      - --state.scheme=path
      - --history.transactions=90000
      - --syncmode=full
      - --db.engine=pebble
      - --tries-verify-mode=none
      - --metrics
      - --metrics.addr=127.0.0.1
      - --metrics.port=26060
      - --graphql
      - --http
      - --http.addr=127.0.0.1
      - --http.port=28545
      - --ws
      - --ws.addr=127.0.0.1
      - --ws.port=28546